name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev pkg-config

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-02-07
          components: rustc-dev, llvm-tools

      - name: Cache Rust Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run cargo-verify test
        run: cargo test -p cargo-verify
