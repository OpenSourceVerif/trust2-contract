# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "cargo" # See documentation for possible values
    directories: # Location of package manifests # security
      - "/"
      - "/cargo-verify"
      - "/trust2-contract"
      - "/trust2-contract-macros"
      - "/utils"
    allow: # security
      - dependency-type: "all"
    schedule:
      interval: "cron"
      cronjob: "0 5 * * *"
      timezone: "Asia/Shanghai"
    # The property '#/updates/0/versioning-strategy' value "increase" did not match one of the following values: lockfile-only, auto
    # versioning-strategy: "increase" # security
